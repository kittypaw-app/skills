[package]
id = "url-monitor"
name = "URL 모니터"
version = "1.0.0"
description = "주기적으로 URL 접속을 확인하고, 상태가 바뀌면 알려줍니다."
author = "KittyPaw Team"
category = "devops"
tags = ["monitoring", "uptime", "storage", "alert"]

[trigger]
type = "schedule"
cron = "*/5 * * * *"

[permissions]
primitives = ["Http", "Storage"]
allowed_hosts = ["*"]

[[config.fields]]
key = "target_url"
label = "URL to Monitor"
type = "string"
required = true

[[config.fields]]
key = "schedule"
label = "Cron Schedule"
type = "cron"
required = false
default = "*/5 * * * *"
