[package]
id = "macro-economy-report"
name = "매크로 경제 리포트"
version = "1.0.0"
description = "매일 주요 ETF 시장 데이터를 수집하고 LLM으로 요약합니다."
author = "KittyPaw Team"
category = "finance"
tags = ["finance", "market", "daily", "llm"]

[trigger]
type = "schedule"
cron = "0 8 * * 1-5"

[permissions]
primitives = ["Http", "Llm", "Storage"]
allowed_hosts = ["query1.finance.yahoo.com", "query2.finance.yahoo.com"]

[[config.fields]]
key = "tickers"
label = "Tickers (comma-separated)"
type = "string"
required = false
default = "SPY,QQQ,TLT,GLD"

[[config.fields]]
key = "schedule"
label = "Cron Schedule"
type = "cron"
required = false
default = "0 8 * * 1-5"
