[package]
id = "air-quality"
name = "미세먼지 알림"
version = "2.0.0"
description = "미세먼지/초미세먼지 등급을 확인하고 알려줍니다. (kittypaw-api OAuth 인증)"
author = "KittyPaw Team"
category = "health"
tags = ["air", "dust", "health", "korea"]

[trigger]
type = "schedule"
cron = "0 7 * * *"

[permissions]
primitives = ["Http"]
allowed_hosts = ["localhost", "127.0.0.1", "api.kittypaw.app"]
context = ["locale"]

[[config.fields]]
key = "api_url"
label = "API Server URL"
type = "string"
required = false
default = "http://localhost:8080"
source = "kittypaw-api/api_url"

[[config.fields]]
key = "access_token"
label = "API Token"
type = "secret"
required = false
source = "kittypaw-api/access_token"

[[config.fields]]
key = "station"
label = "측정소명"
type = "string"
required = false
default = "종로구"
hint = "가까운 측정소명 (예: 종로구, 강남구, 해운대구)"

[[config.fields]]
key = "schedule"
label = "Cron Schedule"
type = "cron"
required = false
default = "0 7 * * *"
